# Production — two-level cache active (Caffeine L1 + Redis L2)
spring.cache.type=redis
spring.data.redis.url=${SPRING_REDIS_URL}

# Gzip API/HTML responses over the wire (only affects transport, not payload content)
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,application/javascript
server.compression.min-response-size=1024
