# Production — two-level cache active (Caffeine L1 + Redis L2)
spring.cache.type=redis
spring.data.redis.url=${SPRING_REDIS_URL}

# MongoDB connection pool + timeouts (prod only): maxPoolSize=50, minPoolSize=5,
# maxWaitTime=5000ms, connectTimeoutMS=5000. Spring Boot has no property binding for
# these, so they are applied by MongoConfig#mongoPoolCustomizer (@Profile("prod")).
# A pool/connect timeout surfaces as HTTP 503 "Server is busy please try again".

# Gzip API/HTML responses over the wire (only affects transport, not payload content)
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

# Tomcat thread pool tuning for a 512MB Render Free instance. The default 200 max
# threads reserve ~200MB of stack; 40 is ample given most reads hit Caffeine/Redis.
# accept-count queues bursts instead of rejecting; connection-timeout drops idle sockets.
server.tomcat.threads.max=40
server.tomcat.threads.min-spare=5
server.tomcat.accept-count=50
server.tomcat.connection-timeout=20000

# Lazy bean initialization to cut startup memory. Beans that must stay eager
# (security, migrations, cache warmup, all @Scheduled tasks) are annotated @Lazy(false).
spring.main.lazy-initialization=true
