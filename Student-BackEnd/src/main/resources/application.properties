spring.application.name=Student-BackEnd
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Railway / Render inject PORT — fallback to 8080 for local dev
server.port=${PORT:8080}

spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=learnData_db
# NOTE: spring.data.mongodb.auto-index-creation is intentionally left OFF.
# Automatic index creation runs at an unpredictable time relative to startup runners,
# and a unique index (roadmap_subjects{roadmapId,subjectId}) can't be built while
# duplicate data exists. Instead, DataIntegrityMigration (@Order(0)) de-duplicates
# the data and then creates every declared index explicitly and deterministically.
# Add new indexes there (or here once you're confident the data satisfies them).

# JWT_SECRET must be set in environment — generate with: openssl rand -hex 32
app.jwt.secret=${JWT_SECRET}
app.jwt.expiry=86400000

# File upload limits — prevent DoS via large uploads
server.servlet.multipart.max-file-size=10MB
server.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-post-size=10485760

# Comma-separated list — add your Vercel URL here via env var
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

# true by default — Render/Railway always use HTTPS. Override to false in application-local.properties for local dev
app.cookie.secure=${COOKIE_SECURE:true}

# Redis timeouts (ignored in local profile — Redis is excluded there)
spring.data.redis.timeout=2000ms
spring.data.redis.connect-timeout=2000ms
# Public SPA origin — post-OAuth redirects land here (/myprofile). MUST be https://learnforearn.in in prod, NOT the Render URL.
app.frontend-url=${APP_URL:http://localhost:5173}
app.url=${APP_URL:http://localhost:5173}

# Brevo API
brevo.api.key=${BREVO_API_KEY:}

# Google OAuth — Web Client ID (public). Used to verify Google ID tokens server-side.
# Must match the VITE_GOOGLE_CLIENT_ID used by the frontend. Leave blank to disable Google login.
google.client-id=${GOOGLE_CLIENT_ID:}

# GitHub OAuth — profile link only (read:user). Client secret stays backend-only.
# Callback: {BACKEND_PUBLIC_URL}/api/auth/github/callback — register that URL on the GitHub OAuth app.
github.client-id=${GITHUB_CLIENT_ID:}
github.client-secret=${GITHUB_CLIENT_SECRET:}
# Public backend base URL for OAuth redirect_uri (no trailing slash). Falls back to the incoming request host.
app.backend-url=${BACKEND_PUBLIC_URL:}

# Actuator — health only, for Render/monitoring
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
# Redis is an optional cache layer with graceful fallback (CacheService never throws
# when Redis is down — it degrades to Caffeine+DB). It must NOT gate overall health:
# a DOWN here returns HTTP 503 and makes Render mark the service unhealthy.
management.health.redis.enabled=false
