server.port=${PORT:8080}

spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://***REMOVED***:***REMOVED***@free-database.lfnuahd.mongodb.net/learnData_db?retryWrites=true&w=majority&appName=Free-Database}
