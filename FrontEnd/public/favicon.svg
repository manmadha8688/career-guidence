<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" style="stop-color:#3B1878"/>
      <stop offset="55%" style="stop-color:#1A0A38"/>
      <stop offset="100%" style="stop-color:#0A0616"/>
    </radialGradient>
    <linearGradient id="blade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F0FF"/>
      <stop offset="100%" style="stop-color:#C9A8FF"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <g filter="url(#glow)" stroke="url(#blade)" stroke-linecap="round" fill="url(#blade)">
    <!-- Sword 1: top-left to bottom-right -->
    <line x1="20" y1="20" x2="80" y2="80" stroke-width="6.5"/>
    <line x1="24" y1="42" x2="42" y2="24" stroke-width="5.5"/>
    <circle cx="74" cy="74" r="4.5" stroke="none"/>
    <!-- Sword 2: top-right to bottom-left -->
    <line x1="80" y1="20" x2="20" y2="80" stroke-width="6.5"/>
    <line x1="76" y1="42" x2="58" y2="24" stroke-width="5.5"/>
    <circle cx="26" cy="74" r="4.5" stroke="none"/>
  </g>
</svg>
